name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run fast verification
        run: |
          npm run lint
          npm run build
          npm run test:unit

      - name: Pack npm tarball
        run: npm run pack:smoke

      - name: Smoke install packed tarball
        run: |
          TARBALL=$(ls artifacts/*.tgz)
          mkdir -p artifacts/smoke
          cd artifacts/smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE/$TARBALL"
          cat <<'JS' > index.mjs
          import { Client } from "@cntryl/fitz";

          const client = new Client({ url: "ws://localhost:4190/ws" });
          console.log(client.getState());
          JS
          node index.mjs

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL=$(ls artifacts/*.tgz)
          npm publish "$TARBALL"
