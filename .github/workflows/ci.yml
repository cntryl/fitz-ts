name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  ci:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      FITZ_BROKER_JWT_HMAC_SECRET: dev-test-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Start Docker Compose
        run: docker compose up -d

      - name: Install dependencies
        run: npm ci

      - name: Lint package
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down --volumes
