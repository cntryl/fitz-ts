name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  fast:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      FITZ_BROKER_JWT_HMAC_SECRET: dev-test-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint package
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Start Docker Compose
        run: docker compose up -d

      - name: Run integration tests
        run: npm run test:integration

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down --volumes

  conformance:
    timeout-minutes: 15
    needs: fast
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [ws, tcp]
        auth_mode: [anonymous, valid_jwt]
    env:
      FITZ_BROKER_JWT_HMAC_SECRET: dev-test-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start Docker Compose
        run: docker compose up -d

      - name: Run conformance suite
        env:
          CONFORMANCE_TRANSPORT: ${{ matrix.transport }}
          CONFORMANCE_AUTH_MODE: ${{ matrix.auth_mode }}
          CONFORMANCE_OUTPUT: artifacts/conformance-${{ matrix.transport }}-${{ matrix.auth_mode }}.json
        run: npm run test:conformance

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fitz-ts-conformance-${{ matrix.transport }}-${{ matrix.auth_mode }}
          path: artifacts/conformance-${{ matrix.transport }}-${{ matrix.auth_mode }}.json

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down --volumes

  pack-smoke:
    timeout-minutes: 10
    needs: fast
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run pack smoke verification
        run: npm run pack:smoke
