name: Publish Package

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Compute release tag
        id: version
        uses: askrjs/actions/actions/compute-release-tag@main

      - name: Check whether tag exists
        id: tag_status
        uses: askrjs/actions/actions/check-tag-exists@main
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: Checkout existing tag
        if: steps.tag_status.outputs.exists == 'true'
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          git fetch origin "refs/tags/$tag:refs/tags/$tag"
          git checkout "$tag"

      - name: Create release tag
        if: steps.tag_status.outputs.exists != 'true'
        uses: askrjs/actions/actions/create-tag@main
        with:
          tag: ${{ steps.version.outputs.tag }}

      - name: Checkout created tag
        if: steps.tag_status.outputs.exists != 'true'
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          git checkout "$tag"

      - name: Install dependencies
        run: npm ci

      - name: Build release
        run: npm run build

      - name: Publish to npm
        uses: askrjs/actions/actions/publish-package@main
