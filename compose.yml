# Fitz Message Broker - Docker Compose Configuration
#
# This runs two Fitz brokers:
# - fitz-auth on 4090/4091 with JWT auth required
# - fitz-anon on 4190/4191 with anonymous access enabled
#
# Access:
# - Auth HTTP:    http://localhost:4090/
# - Auth WS:      ws://localhost:4090/ws
# - Auth TCP:     tcp://localhost:4091
# - Anon HTTP:    http://localhost:4190/
# - Anon WS:      ws://localhost:4190/ws
# - Anon TCP:     tcp://localhost:4191

services:
  fitz-auth:
    image: ghcr.io/cntryl/fitz:latest
    container_name: fitz-auth
    ports:
      - "4090:4090"
      - "4091:4091"
    environment:
      FITZ_AUTH_REQUIRED: "true"
      FITZ_ASSUME_EXTERNAL_TLS: "true"
      FITZ_WS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:4090,http://127.0.0.1:4090"
      FITZ_JWT_HMAC_SECRET: "test-secret-key"
      FITZ_JWT_AUDIENCE: "fitz"
      FITZ_ROUTE_FAMILIES: "1"
      FITZ_ROUTE_FAMILY_MAP: "fitz-ts-tests=1"
      FITZ_STORAGE_MODE: "memory"
      FITZ_STORAGE_PATH: "/data"
      RUST_LOG: "info,fitz=trace"
    restart: unless-stopped
    healthcheck:
      disable: true

  fitz-anon:
    image: ghcr.io/cntryl/fitz:latest
    container_name: fitz-anon
    ports:
      - "4190:4090"
      - "4191:4091"
    environment:
      FITZ_AUTH_REQUIRED: "false"
      FITZ_STORAGE_MODE: "memory"
      FITZ_STORAGE_PATH: "/data"
      RUST_LOG: "info,fitz=trace"
    restart: unless-stopped
    healthcheck:
      disable: true
